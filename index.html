<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Probabilidade em Sorteios</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef2ff, #dbeafe);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      color: #1e3a8a;
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      margin-bottom: 25px;
      font-size: 15px;
    }

    label {
      display: block;
      text-align: left;
      margin: 12px 0 6px;
      font-weight: 600;
      color: #333;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    #resultado {
      margin-top: 22px;
      padding: 15px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .sucesso {
      background: #dcfce7;
      color: #166534;
    }

    .erro {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎲 Calculadora de Sorteio</h1>
  <p>Descubra sua probabilidade de ganhar em qualquer sorteio.</p>

  <label for="meusBilhetes">Quantidade de bilhetes que você possui</label>
  <input type="number" id="meusBilhetes" placeholder="Ex: 5" min="1">

  <label for="totalBilhetes">Quantidade total de bilhetes</label>
  <input type="number" id="totalBilhetes" placeholder="Ex: 100" min="1">

  <button onclick="calcularProbabilidade()">Calcular Probabilidade</button>

  <div id="resultado"></div>
</div>

<script>
function calcularProbabilidade() {
    let meusBilhetes = Number(document.getElementById("meusBilhetes").value);
    let totalBilhetes = Number(document.getElementById("totalBilhetes").value);
    let resultado = document.getElementById("resultado");

    if (!meusBilhetes || !totalBilhetes || meusBilhetes <= 0 || totalBilhetes <= 0) {
        resultado.className = "erro";
        resultado.innerHTML = "❌ Digite valores válidos maiores que zero.";
        return;
    }

    if (meusBilhetes > totalBilhetes) {
        resultado.className = "erro";
        resultado.innerHTML = "❌ Seus bilhetes não podem ser maiores que o total.";
        return;
    }

    let chance = (meusBilhetes / totalBilhetes) * 100;

    resultado.className = "sucesso";
    resultado.innerHTML = `🍀 Sua probabilidade de ganhar é de <br>${chance.toFixed(2)}%`;
}
</script>

</body>
</html>
