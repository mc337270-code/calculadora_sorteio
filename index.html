<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Mega-Sena</title>

<style>

body{

<div id="inicio" class="container">

    <h1>🎲 Calculadora de Probabilidades</h1>

    <p>Escolha uma opção:</p>

    <button onclick="mostrarMega()">
        🍀 Mega-Sena
    </button>

    <br><br>

    <button onclick="mostrarBingo()">
        🎱 Bingo
    </button>

</div>

    
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#00995D,#00B86B);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:420px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.25);
}

.logo{
    font-size:42px;
}

h1{
    color:#00995D;
    margin-bottom:10px;
}

p{
    color:#555;
}

input{
    width:90%;
    padding:12px;
    margin-top:15px;
    border:2px solid #00995D;
    border-radius:10px;
    font-size:16px;
}

button{
    margin-top:15px;
    background:#00B86B;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00995D;
}

.resultado{
    margin-top:20px;
    font-size:22px;
    color:#00995D;
    font-weight:bold;
}

</style>

</head>
<body>

<div id="mega" class="container" style="display:none;">
    
    <div class="logo">🍀</div>

    <h1>Mega-Sena</h1>

    <p>Calcule suas chances de ganhar na Mega-Sena</p>

    <input
        type="number"
        id="numeros"
        min="6"
        max="20"
        placeholder="Digite de 6 a 20 números">

    <br>

    <button onclick="calcular()">
        Calcular Chance
    </button>

    <div class="resultado" id="resultado"></div>

<br><br>

    <div id="bingo" class="container" style="display:none;">

    <h1>🎱 Bingo</h1>

    <p>Informe quantas bolas existem no sorteio:</p>

    <input
        type="number"
        id="bolas"
        min="1"
        placeholder="Ex.: 75">

    <br>

    <button onclick="calcularBingo()">
        Calcular
    </button>

    <div id="resultadoBingo" class="resultado"></div>

    <br><br>

    <button onclick="voltar()">
        ← Voltar ao Menu
    </button>

</div>

<button onclick="voltar()">
    ← Voltar ao Menu
</button>

</div>

<script>

function fatorial(n){
    let resultado = 1;

    for(let i = 2; i <= n; i++){
        resultado *= i;
    }

    return resultado;
}

function combinacao(n,p){
    return fatorial(n) /
           (fatorial(p) * fatorial(n-p));
}

function calcular(){

    let numeros =
        parseInt(document.getElementById("numeros").value);

    if(isNaN(numeros) || numeros < 6 || numeros > 20){

        document.getElementById("resultado").innerHTML =
        "Digite um valor entre 6 e 20.";

        return;
    }

    let total = combinacao(60,6);
    let apostas = combinacao(numeros,6);

  let chance = Math.round(total / apostas);

let porcentagem =
    ((apostas / total) * 100).toFixed(10);

document.getElementById("resultado").innerHTML =
    "Chance: 1 em " +
    chance.toLocaleString("pt-BR") +
    "<br><br>" +
    "Porcentagem: " +
    porcentagem +
    "%";
}

</script>

</body>
</html>
